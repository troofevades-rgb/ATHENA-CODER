name: lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ruff:
    # Cross-platform lint matrix. ruff itself is platform-independent
    # but the import-detection / line-ending behaviour differs subtly
    # between Windows and POSIX (the model picker + crash_log both
    # shipped Windows-specific path code that the Linux-only matrix
    # never validated). Running ruff on Windows + macOS too catches
    # platform-specific syntax / encoding regressions before they
    # bite an operator at runtime.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff
      - run: ruff check athena tests
      - run: ruff format --check athena tests

  mypy:
    runs-on: ubuntu-latest
    # mypy --strict is clean across the athena package, so this job is
    # REQUIRED — nothing gates strictness otherwise and it would erode
    # silently. If a legitimately hard case appears, narrow it with a
    # per-module override in pyproject (documented), not by reopening
    # continue-on-error for the whole job.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gateway,observability]"
      - run: mypy

  version-sync:
    # Gates the build: pyproject.toml's `version` and
    # athena.__version__ must match. PyPI refuses re-uploads of the
    # same version, so a release where the two disagree would ship a
    # wheel whose installed `athena --version` prints something
    # different from the package's metadata.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install athena (no extras needed)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Verify pyproject.toml ↔ athena.__version__
        run: python scripts/verify_version.py
