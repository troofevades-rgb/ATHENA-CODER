name: coverage

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Pinned to 3.11 because the test suite wedges on a
          # pytest-asyncio teardown under 3.12+ (see comment in
          # tests.yml). T1-04 unwedges the async fixture and bumps
          # this back to 3.12 or 3.13.
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          # Match tests.yml — coverage collection imports the same
          # gateway + observability deps the test suite does.
          pip install -e ".[dev,gateway,observability]"
      - name: Run coverage
        run: |
          pytest --cov=athena --cov-report=term-missing --cov-report=xml \
                 --cov-fail-under=60
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
