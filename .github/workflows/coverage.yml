name: coverage

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          # Pinned to 3.11 because the test suite wedges on a
          # pytest-asyncio teardown under 3.12+ (see comment in
          # tests.yml). T1-04 unwedges the async fixture and bumps
          # this back to 3.12 or 3.13.
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          # Match tests.yml -- coverage collection imports the same
          # gateway, observability, and vision deps the test suite
          # does (tools/__init__.py's side-effect import pulls in
          # vision at collection time; browser is lazy-imported and
          # gated by _playwright_available()).
          pip install -e ".[dev,gateway,observability,vision]"
      - name: Run coverage
        run: |
          # T1-04: bumped from 60 to 65 once tests/agent/ landed.
          # Global athena coverage measured at ~75% post-T1-04; agent/
          # subtree at 62%. 65 keeps a comfortable buffer for both.
          pytest --cov=athena --cov-report=term-missing --cov-report=xml \
                 --cov-fail-under=65
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
